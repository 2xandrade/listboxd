<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Letterboxd Manager - Gerencie e compartilhe sua lista de filmes">
    <meta name="theme-color" content="#14181c">
    <title>Letterboxd Manager</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Letterboxd Manager</h1>
            <nav id="nav-menu"></nav>
        </header>
        <main id="main-content">
            <!-- Tab Navigation -->
            <div id="main-tabs" class="main-tabs hidden"></div>

            <!-- Login Section -->
            <section id="login-section" class="hidden">
                <div class="auth-container">
                    <div class="auth-tabs">
                        <button class="auth-tab active" data-tab="login">Login</button>
                        <button class="auth-tab" data-tab="register">Cadastro</button>
                    </div>
                    
                    <!-- Login Form -->
                    <div id="login-form-container" class="auth-form-container">
                        <h2>Entrar</h2>
                        <form id="login-form">
                            <div class="form-group">
                                <label for="login-email">Email</label>
                                <input type="email" id="login-email" name="email" required autocomplete="email" placeholder="seu@email.com" />
                            </div>
                            <div class="form-group">
                                <label for="login-password">Senha</label>
                                <input type="password" id="login-password" name="password" required autocomplete="current-password" placeholder="••••••••" />
                            </div>
                            <div id="login-error" class="error-message hidden"></div>
                            <button type="submit" id="login-btn" class="auth-btn">
                                <span class="btn-text">Entrar</span>
                                <span class="btn-loader hidden">Carregando...</span>
                            </button>
                        </form>
                    </div>
                    
                    <!-- Register Form -->
                    <div id="register-form-container" class="auth-form-container hidden">
                        <h2>Criar Conta</h2>
                        <form id="register-form">
                            <div class="form-group">
                                <label for="register-name">Nome</label>
                                <input type="text" id="register-name" name="name" required autocomplete="name" placeholder="Seu nome completo" />
                            </div>
                            <div class="form-group">
                                <label for="register-email">Email</label>
                                <input type="email" id="register-email" name="email" required autocomplete="email" placeholder="seu@email.com" />
                            </div>
                            <div class="form-group">
                                <label for="register-password">Senha</label>
                                <input type="password" id="register-password" name="password" required autocomplete="new-password" placeholder="Mínimo 6 caracteres" minlength="6" />
                            </div>
                            <div class="form-group">
                                <label for="register-password-confirm">Confirmar Senha</label>
                                <input type="password" id="register-password-confirm" name="password-confirm" required autocomplete="new-password" placeholder="Digite a senha novamente" minlength="6" />
                            </div>
                            <div id="register-error" class="error-message hidden"></div>
                            <button type="submit" id="register-btn" class="auth-btn">
                                <span class="btn-text">Criar Conta</span>
                                <span class="btn-loader hidden">Carregando...</span>
                            </button>
                        </form>
                    </div>
                </div>
            </section>

            <!-- Film Listing Section -->
            <section id="film-listing" class="hidden tab-content">
                <h2>Explorar Filmes</h2>
                
                <!-- Search Bar -->
                <div class="search-container">
                    <input type="text" id="film-search" placeholder="Buscar filmes por título... (Pressione / para focar)" title="Atalho: Pressione / para focar" />
                    <button id="search-btn">Buscar</button>
                </div>

                <!-- Category Tabs -->
                <div class="category-tabs">
                    <button class="tab-btn active" data-category="popular">Populares</button>
                    <button class="tab-btn" data-category="trending">Em Alta</button>
                </div>

                <!-- Loading State -->
                <div id="films-loading" class="loading hidden">
                    <p>Carregando filmes...</p>
                </div>

                <!-- Error Message -->
                <div id="films-error" class="error hidden"></div>

                <!-- Films Grid -->
                <div id="films-grid" class="films-grid"></div>

                <!-- Infinite Scroll Loading Indicator -->
                <div id="infinite-scroll-loading" class="infinite-scroll-loading hidden">
                    <div class="loading-spinner"></div>
                </div>

                <!-- Pagination Controls -->
                <div id="pagination-controls" class="pagination-controls hidden">
                    <button id="prev-page-btn" class="pagination-btn">← Anterior</button>
                    <span id="pagination-info" class="pagination-info"></span>
                    <button id="next-page-btn" class="pagination-btn">Próximo →</button>
                </div>
            </section>

            <!-- Shared List Section -->
            <section id="shared-list" class="hidden tab-content">
                <h2>Lista Compartilhada</h2>
                
                <!-- Filter Chips Container -->
                <div id="filter-chips-container" class="filter-chips-container hidden"></div>
                
                <!-- Filter Toggle Button (Mobile) -->
                <button id="filter-toggle-btn" class="filter-toggle-btn" aria-expanded="false" aria-controls="filter-controls">
                    <span>Filtros e Ordenação</span>
                    <span class="toggle-icon">▼</span>
                </button>
                
                <!-- Filter Controls -->
                <div id="filter-controls" class="filter-controls">
                    <div class="filter-group">
                        <label for="genre-filter">Filtrar por gênero:</label>
                        <select id="genre-filter" class="filter-select">
                            <option value="">Todos os gêneros</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label for="name-filter">Buscar por nome:</label>
                        <input type="text" id="name-filter" class="filter-input" placeholder="Digite o nome do filme..." />
                    </div>
                    
                    <div class="filter-group">
                        <label for="streaming-filter">Filtrar por streaming:</label>
                        <select id="streaming-filter" class="filter-select">
                            <option value="">Todos os serviços</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label for="sort-filter">Ordenar por:</label>
                        <select id="sort-filter" class="filter-select">
                            <option value="dateAdded">Data de Adição</option>
                            <option value="rating">Avaliação</option>
                            <option value="year">Ano de Lançamento</option>
                            <option value="random">Aleatório</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <button id="random-filter-btn" class="filter-btn">🎲 Ordem Aleatória</button>
                    </div>
                    
                    <div class="filter-group">
                        <button id="clear-filters-btn" class="filter-btn clear-btn">✕ Limpar Filtros</button>
                    </div>
                </div>
                
                <!-- Filter Count Display -->
                <div id="filter-count" class="filter-count hidden"></div>
                
                <div id="shared-list-container"></div>
            </section>

            <!-- Watched Films Section -->
            <section id="watched-films" class="hidden tab-content">
                <h2>Filmes Assistidos</h2>
                
                <!-- Filter Toggle Button (Mobile) -->
                <button id="watched-filter-toggle-btn" class="filter-toggle-btn" aria-expanded="false" aria-controls="watched-filter-controls">
                    <span>Filtros e Ordenação</span>
                    <span class="toggle-icon">▼</span>
                </button>
                
                <!-- Filter Controls for Watched Films -->
                <div id="watched-filter-controls" class="filter-controls">
                    <div class="filter-group">
                        <label for="watched-genre-filter">Filtrar por gênero:</label>
                        <select id="watched-genre-filter" class="filter-select">
                            <option value="">Todos os gêneros</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label for="watched-name-filter">Buscar por nome:</label>
                        <input type="text" id="watched-name-filter" class="filter-input" placeholder="Digite o nome do filme..." />
                    </div>
                    
                    <div class="filter-group">
                        <label for="watched-sort-filter">Ordenar por:</label>
                        <select id="watched-sort-filter" class="filter-select">
                            <option value="dateAdded">Data de Adição</option>
                            <option value="rating">Avaliação</option>
                            <option value="year">Ano de Lançamento</option>
                            <option value="random">Aleatório</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <button id="watched-random-filter-btn" class="filter-btn">🎲 Ordem Aleatória</button>
                    </div>
                    
                    <div class="filter-group">
                        <button id="watched-clear-filters-btn" class="filter-btn clear-btn">✕ Limpar Filtros</button>
                    </div>
                </div>
                
                <!-- Filter Count Display -->
                <div id="watched-filter-count" class="filter-count hidden"></div>
                
                <div id="watched-films-container"></div>
            </section>
        </main>

        <!-- Film Details Modal -->
        <div id="film-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <button class="modal-close" aria-label="Fechar (ESC)" title="Fechar (ESC)">&times;</button>
                <div class="modal-body">
                    <div class="modal-poster-container">
                        <img id="modal-poster" class="modal-poster" alt="" />
                    </div>
                    <div class="modal-info">
                        <h2 id="modal-title" class="modal-title"></h2>
                        <div class="modal-meta">
                            <span id="modal-rating" class="modal-rating"></span>
                            <span id="modal-year" class="modal-year"></span>
                        </div>
                        <div id="modal-genres" class="modal-genres"></div>
                        <div class="modal-synopsis">
                            <h3>Sinopse</h3>
                            <p id="modal-overview"></p>
                        </div>
                        <button id="modal-add-btn" class="modal-add-btn">Adicionar à Lista</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Rating Modal -->
        <div id="rating-modal" class="modal rating-modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content rating-modal-content">
                <button class="modal-close" aria-label="Fechar (ESC)" title="Fechar (ESC)">&times;</button>
                <div class="rating-modal-body">
                    <h2 class="rating-modal-title">Avaliar Filme</h2>
                    <p class="rating-modal-subtitle">Como foi a experiência?</p>
                    
                    <div class="rating-stars-container">
                        <div class="rating-stars" id="rating-stars">
                            <button class="star-btn empty" data-star="1" aria-label="Estrela 1">★</button>
                            <button class="star-btn empty" data-star="2" aria-label="Estrela 2">★</button>
                            <button class="star-btn empty" data-star="3" aria-label="Estrela 3">★</button>
                            <button class="star-btn empty" data-star="4" aria-label="Estrela 4">★</button>
                            <button class="star-btn empty" data-star="5" aria-label="Estrela 5">★</button>
                        </div>
                        <p class="rating-label" id="rating-label">Selecione uma avaliação</p>
                    </div>
                    
                    <div class="review-container">
                        <label for="review-input" class="review-label">Review (opcional)</label>
                        <textarea 
                            id="review-input" 
                            class="review-input" 
                            placeholder="Compartilhe seus pensamentos sobre o filme..."
                            rows="4"
                        ></textarea>
                    </div>
                    
                    <div class="rating-modal-actions">
                        <button id="rating-cancel-btn" class="rating-btn rating-cancel-btn">Cancelar</button>
                        <button id="rating-submit-btn" class="rating-btn rating-submit-btn" disabled>Confirmar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
    <script src="config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/users.js"></script>
    <script src="js/films.js"></script>
    <script src="js/list.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/filter-chips.js"></script>
    <script src="js/skeleton.js"></script>
    <script src="js/streaming.js"></script>
    <script src="js/infinite-scroll.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/tabs.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
